version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://portfolio_user:portfolio_pgpass2024@db:5432/portfolio_db}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_EMAIL_TO=${CONTACT_EMAIL_TO}
      - CONTACT_EMAIL_FROM=${CONTACT_EMAIL_FROM}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NODE_ENV=production
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Service
      - "traefik.http.services.portfolio-app.loadbalancer.server.port=3000"
      - "traefik.http.services.portfolio-app.loadbalancer.server.scheme=http"
      # HTTPS router
      - "traefik.http.routers.portfolio-secure.rule=Host(`perfil.abadgroup.tech`)"
      - "traefik.http.routers.portfolio-secure.entrypoints=websecure"
      - "traefik.http.routers.portfolio-secure.tls=true"
      - "traefik.http.routers.portfolio-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portfolio-secure.service=portfolio-app"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.portfolio-http.rule=Host(`perfil.abadgroup.tech`)"
      - "traefik.http.routers.portfolio-http.entrypoints=web"
      - "traefik.http.routers.portfolio-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    restart: unless-stopped
    networks:
      - portfolio_net
      - dokploy-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-portfolio_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-portfolio_pgpass2024}
      - POSTGRES_DB=${POSTGRES_DB:-portfolio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - portfolio_net
    # Puerto NO expuesto al exterior — solo accesible desde la red interna

volumes:
  postgres_data:

networks:
  portfolio_net:
    driver: bridge
  dokploy-network:
    external: true
